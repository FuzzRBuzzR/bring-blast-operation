name: Venture Engine Master – 24h Planned Work Always

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Select mode"
        required: true
        type: choice
        default: "24h-planned-work"
        options:
          - 24h-planned-work
          - force-gumroad-check
          - revenue-opportunity-scan
          - full-engine-check
  schedule:
    - cron: "0 21 * * *"
  repository_dispatch:
    types: [obsidian-trigger, 24h-planned-work, force-gumroad-check]

permissions:
  contents: read
  actions: write

jobs:
  maintain-24h-work:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Always Maintain 24h Planned Unfinished Work

    steps:
      - uses: actions/checkout@v4

      - name: Enforce Rolling 24 Hours of Planned Work
        run: |
          echo "============================================================"
          echo "  24-HOUR PLANNED YET-TO-COMPLETE WORK – ENFORCED"
          echo "  $(date -u)"
          echo "============================================================"
          echo ""
          echo "RULE: At all times there must be a clear 24-hour window of"
          echo "      high-value work that is planned but not yet finished."
          echo ""
          echo "CURRENT 24H PLANNED WORK:"
          echo "1. Connect Gumroad payout method"
          echo "   https://gumroad.com/settings/payments"
          echo "2. Confirm the live product can accept payment"
          echo "   https://ventureengine.gumroad.com/l/ve-tiling-art-2026"
          echo "3. Record first AUD and flip status to FIRST_CASH"
          echo "4. Queue the next revenue action after first sale"
          echo ""
          echo "Everything else in the chain is already complete."
          echo "This is the only open high-value work item."

      - name: Gumroad Status
        run: |
          echo "Gumroad payout is still the single remaining blocker."
          echo "Operator action required at:"
          echo "https://gumroad.com/settings/payments"

      - name: Write artifact
        run: |
          cat > 24h-work.md << 'EOF'
          # Rolling 24-Hour Planned Work
          - [ ] Connect Gumroad payout
          - [ ] Verify first payment possible
          - [ ] Log first AUD
          - [ ] Update status to FIRST_CASH
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: 24h-planned-work
          path: 24h-work.md
